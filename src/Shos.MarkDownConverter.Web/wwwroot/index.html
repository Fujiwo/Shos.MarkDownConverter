<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shos.MarkDownConverter</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Shos.MarkDownConverter</p>
            <h1>MarkItDown でファイルを Markdown に変換</h1>
            <p class="lead">単一ファイルをアップロードすると、サーバー側で Python 版 MarkItDown を実行して Markdown を返します。</p>
        </section>

        <section class="panel">
            <form id="convert-form" class="upload-form">
                <label class="dropzone" for="file-input" id="dropzone">
                    <input id="file-input" name="file" type="file" required>
                    <span class="dropzone-title">ここにファイルをドロップするか、クリックして選択</span>
                    <span class="dropzone-subtitle" id="selected-file">未選択</span>
                </label>

                <div class="meta-row">
                    <div>
                        <h2>対応拡張子</h2>
                        <p id="supported-extensions">読み込み中...</p>
                    </div>
                    <div>
                        <h2>サイズ上限</h2>
                        <p id="max-size">読み込み中...</p>
                    </div>
                </div>

                <div class="actions">
                    <button id="convert-button" type="submit">変換する</button>
                    <span id="status-text" class="status" aria-live="polite"></span>
                </div>
            </form>
        </section>

        <section class="panel" id="error-panel" hidden>
            <h2>エラー</h2>
            <p id="error-message"></p>
            <ul id="error-tips"></ul>
        </section>

        <section class="panel result-panel" id="result-panel" hidden>
            <div class="result-header">
                <h2>変換結果</h2>
                <div class="result-actions">
                    <button id="copy-button" type="button">コピー</button>
                    <button id="download-button" type="button">ダウンロード</button>
                </div>
            </div>
            <textarea id="result-output" readonly spellcheck="false"></textarea>
        </section>
    </main>

    <script src="/app.js" defer></script>
</body>
</html>
